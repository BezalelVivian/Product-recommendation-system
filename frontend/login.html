<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShopSmart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #f1f3f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-card { display: flex; background: #fff; width: 750px; height: 500px; border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; }
        
        .login-left { background: #2874f0; color: white; width: 40%; padding: 40px 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .login-left h2 { font-size: 28px; font-weight: 600; margin-bottom: 15px; }
        .login-left p { font-size: 16px; line-height: 1.5; color: #dbdbdb; }
        .login-left img { width: 100%; object-fit: contain; margin-top: 30px; }

        .login-right { width: 60%; padding: 50px; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group input { width: 100%; border: none; border-bottom: 1px solid #e0e0e0; padding: 10px 0; font-size: 15px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-bottom: 2px solid #2874f0; }
        .input-group label { position: absolute; left: 0; top: 10px; color: #878787; font-size: 15px; pointer-events: none; transition: 0.2s ease all; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -15px; font-size: 12px; color: #2874f0; }

        .btn-primary { background: #fb641b; color: #fff; width: 100%; padding: 14px; border: none; border-radius: 2px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.2); margin-top: 10px; transition: 0.2s; }
        .btn-primary:hover { background: #f3580e; }
        
        .divider { text-align: center; margin: 25px 0; color: #878787; font-size: 14px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #e0e0e0; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-guest { background: #fff; color: #2874f0; width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 2px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: 0.2s; }
        .btn-guest:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-left">
            <div>
                <h2>Login</h2>
                <p>Get access to your Orders, Wishlist and Recommendations</p>
            </div>
            <!-- Standard Flipkart style aesthetic placeholder -->
            <img src="https://placehold.co/300x200/2874f0/ffffff?text=ShopSmart+AI&font=Montserrat" alt="Login">
        </div>
        <div class="login-right">
            <div class="input-group">
                <input type="email" required id="email">
                <label>Enter Email/Mobile number</label>
            </div>
            <div class="input-group">
                <input type="password" required id="password">
                <label>Enter Password</label>
            </div>
            
            <button class="btn-primary" onclick="alert('Full auth coming soon! Use Guest Login for now.')">Login</button>
            
            <div class="divider">OR</div>
            
            <button class="btn-guest" id="guestBtn" onclick="loginGuest()">Continue as Guest</button>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        
        async function loginGuest() {
            const btn = document.getElementById('guestBtn');
            btn.textContent = "Logging in...";
            try {
                let res = await fetch(`${API}/auth/guest`, {method: 'POST'});
                let data = await res.json();
                
                // Save user and redirect back to the store!
                localStorage.setItem('user_id', data.user_id);
                window.location.href = 'shop.html';
                
            } catch(e) { 
                console.error("Login failed", e);
                btn.textContent = "Error. Try Again.";
            }
        }
    </script>
</body>
</html>
