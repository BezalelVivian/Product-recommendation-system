<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart AI | Premium Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

        :root {
            --bg: #F5F7FA;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #FFFFFF;
            --text: #1D1D1F;
            --text-light: #86868B;
            --blue: #0066CC; 
            --blue-gradient: linear-gradient(135deg, #0066CC, #5E5CE6);
            --border: rgba(0, 0, 0, 0.08);
            --gold: #F5A623;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 12px 24px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #999999; }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in-up { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .pop-anim { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Glassmorphism Header */
        .sticky-top { 
            position: sticky; top: 0; z-index: 100; 
            background: var(--surface); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        header { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; cursor: pointer; transition: transform 0.2s; }
        .logo:hover { transform: scale(1.02); }
        .logo span { background: var(--blue-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-bar { flex: 1; max-width: 650px; margin: 0 40px; display: flex; background: #F0F2F5; border-radius: 100px; padding: 4px; transition: box-shadow 0.3s, background 0.3s; }
        .search-bar:focus-within { background: #FFF; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.2); }
        .search-bar input { width: 100%; padding: 12px 20px; border: none; outline: none; font-size: 15px; background: transparent; }
        .search-bar button { padding: 12px 28px; background: var(--text); color: white; border: none; cursor: pointer; font-weight: 600; border-radius: 100px; transition: transform 0.2s; }
        .search-bar button:hover { transform: scale(0.97); }
        .search-bar button:active { transform: scale(0.92); }
        
        .nav-icons { display: flex; gap: 25px; align-items: center; }
        .icon-btn { cursor: pointer; position: relative; font-size: 22px; background: none; border: none; display: flex; flex-direction: column; align-items: center; color: var(--text); transition: transform 0.2s; }
        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn span { font-size: 11px; margin-top: 6px; font-weight: 600; color: var(--text-light); }
        .badge { position: absolute; top: -6px; right: -6px; background: #FF3B30; color: white; font-size: 11px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(255,59,48,0.4); }

        /* High Density Category Bar */
        .nav-wrapper { display: flex; align-items: center; padding: 4px 10px; border-top: 1px solid rgba(0,0,0,0.03); }
        .nav-arrow { background: none; border: none; font-size: 18px; padding: 5px 15px; cursor: pointer; color: var(--text-light); transition: color 0.2s; }
        .nav-arrow:hover { color: var(--blue); }
        .subnav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; flex: 1; scroll-behavior: smooth; align-items: center;}
        .subnav::-webkit-scrollbar { display: none; } 
        
        .snav-item { padding: 8px 18px; border-radius: 100px; background: transparent; border: 1px solid transparent; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 600; transition: all 0.2s ease; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
        .snav-item:hover { background: #E9ECEF; color: var(--text); }
        .snav-item.active { background: var(--surface-solid); color: var(--text); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .btn-for-you { background: var(--blue-gradient) !important; color: white !important; border: none !important; box-shadow: 0 4px 12px rgba(94, 92, 230, 0.3) !important; transition: transform 0.2s, box-shadow 0.2s !important; }
        .btn-for-you:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(94, 92, 230, 0.4) !important; }

        .layout { display: flex; max-width: 1600px; margin: 30px auto; padding: 0 30px; gap: 40px; }
        
        /* Sidebar Filters */
        .sidebar { 
            width: 270px; flex-shrink: 0; background: var(--surface-solid); padding: 30px; 
            border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); 
            align-self: flex-start; position: sticky; top: 160px; height: calc(100vh - 190px); overflow-y: auto; 
        }
        .btn-clear { width: 100%; padding: 12px; background: rgba(255, 59, 48, 0.05); border: 1px solid rgba(255, 59, 48, 0.2); color: #FF3B30; border-radius: var(--radius-md); cursor: pointer; margin-bottom: 30px; font-weight: 600; transition: all 0.2s; }
        .btn-clear:hover { background: #FF3B30; color: white; }
        .filter-group { margin-bottom: 30px; }
        .filter-title { font-weight: 700; margin-bottom: 15px; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-light); }
        .filter-item { display: flex; align-items: center; margin-bottom: 14px; font-size: 14px; cursor: pointer; color: var(--text); font-weight: 500; transition: color 0.2s; }
        .filter-item:hover { color: var(--blue); }
        .filter-item input { margin-right: 12px; cursor: pointer; width: 16px; height: 16px; accent-color: var(--blue); }
        .price-inputs { display: flex; gap: 8px; margin-top: 15px; align-items: center; }
        .price-inputs input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; background: #F8F9FA; transition: border 0.2s; }
        .price-inputs input:focus { border-color: var(--blue); background: #FFF; }
        .btn-go { padding: 10px 18px; background: var(--text); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: transform 0.2s; }
        .btn-go:hover { transform: scale(0.95); }
        select { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-weight: 500; outline:none; cursor:pointer; background: #F8F9FA; appearance: none; transition: border 0.2s; }
        select:focus { border-color: var(--blue); background: #FFF; }

        /* Main Content & Grid */
        .main-content { flex: 1; padding-bottom: 60px; }
        .section-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); letter-spacing: -0.5px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        
        /* Supercar Product Cards */
        .card { background: var(--surface-solid); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s; cursor: pointer; display: flex; flex-direction: column; box-shadow: var(--shadow-sm);}
        .card:hover { transform: translateY(-6px) scale(1.01); box-shadow: var(--shadow-hover); }
        .img-container { height: 180px; background: #FFF; position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .img-container img { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover .img-container img { transform: scale(1.08); }
        
        .card-info { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
        .brand { font-size: 11px; color: var(--text-light); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
        .title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 10px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .rating { color: var(--gold); font-size: 12px; margin-bottom: 15px; font-weight: bold; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
        .add-btn { background: #F0F2F5; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; color: var(--text); }
        .card:hover .add-btn { background: var(--blue); color: white; box-shadow: 0 4px 10px rgba(0,102,204,0.3); }
        .add-btn:active { transform: scale(0.85); }

        /* Skeleton Loaders */
        .skeleton { pointer-events: none; }
        .skeleton-img { height: 180px; background: #E2E2E8; background: linear-gradient(90deg, #F0F2F5 25%, #E2E2E8 50%, #F0F2F5 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        .skeleton-text { height: 12px; background: #F0F2F5; margin-bottom: 10px; border-radius: 4px; background: linear-gradient(90deg, #F0F2F5 25%, #E2E2E8 50%, #F0F2F5 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        .skeleton-brand { width: 40%; height: 10px; margin-bottom: 15px; }
        .skeleton-title { width: 90%; height: 16px; margin-bottom: 8px; }
        .skeleton-title-2 { width: 70%; height: 16px; margin-bottom: 20px; }
        .skeleton-price { width: 40%; height: 20px; margin-top: auto; }

        /* Modal - Frosted Overlay */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { opacity: 1; display: flex; }
        .modal { background: var(--surface-solid); width: 900px; max-width: 95%; border-radius: 20px; display: flex; overflow: hidden; position: relative; max-height: 90vh; box-shadow: 0 25px 50px rgba(0,0,0,0.25); transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.show .modal { transform: scale(1); }
        .modal-close { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: #F0F2F5; font-size: 20px; cursor: pointer; color: var(--text-light); z-index: 10; border: none; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .modal-close:hover { background: #E2E2E8; color: var(--text); transform: rotate(90deg); }
        .modal-img-col { width: 50%; background: #F8F9FA; padding: 40px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
        .modal-info-col { width: 50%; padding: 50px; overflow-y: auto; }
        .modal-brand { color: var(--blue); font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
        .modal-title { font-size: 26px; font-weight: 700; margin-bottom: 15px; line-height: 1.3; color: var(--text); letter-spacing: -0.5px; }
        .modal-rating { font-size: 16px; color: var(--gold); font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .modal-rating span { color: var(--text-light); font-weight: 500; font-size: 14px; }
        .modal-price { font-size: 36px; font-weight: 700; margin-bottom: 30px; color: var(--text); letter-spacing: -1px; }
        .modal-desc { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 35px; }
        .modal-add-btn { width: 100%; padding: 18px; background: var(--text); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: all 0.2s; }
        .modal-add-btn:hover { background: var(--blue); box-shadow: 0 10px 25px rgba(0,102,204,0.3); transform: translateY(-2px); }
        .modal-add-btn:active { transform: translateY(0) scale(0.98); }

        /* Cart Slider - iOS Style */
        .cart-slider { position: fixed; top: 0; right: -450px; width: 420px; height: 100vh; background: var(--surface-solid); box-shadow: -10px 0 30px rgba(0,0,0,0.08); transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1001; display: flex; flex-direction: column; }
        .cart-slider.open { right: 0; }
        .cart-header { padding: 25px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .cart-items { flex: 1; overflow-y: auto; padding: 25px 30px; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid #F0F2F5; animation: slideUpFade 0.3s ease forwards; }
        .cart-item img { width: 80px; height: 80px; object-fit: contain; background: #F8F9FA; padding: 10px; border-radius: 10px; }
        .cart-item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .cart-item-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;}
        .cart-item-price { font-weight: 700; color: var(--text); font-size: 15px; }
        .cart-remove { font-size: 12px; color: #FF3B30; cursor: pointer; border: none; background: none; margin-top: 8px; font-weight: 600; text-align: left; transition: opacity 0.2s;}
        .cart-remove:hover { opacity: 0.7; }
        .cart-footer { padding: 30px; border-top: 1px solid var(--border); background: #FFF; box-shadow: 0 -10px 20px rgba(0,0,0,0.02); }
        .cart-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
        .checkout-btn { width: 100%; padding: 18px; background: var(--blue-gradient); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 20px rgba(0,102,204,0.2); }
        .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(0,102,204,0.3); }

        .toast-notification {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(29, 29, 31, 0.9); backdrop-filter: blur(10px); color: white;
            padding: 16px 28px; border-radius: 100px; font-size: 14px; font-weight: 500;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2000; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .toast-notification.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="sticky-top">
        <header>
            <div class="logo" onclick="window.location.reload()">Shop<span>Smart</span></div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search for products, brands and more..." onkeypress="if(event.key==='Enter') triggerSearch()">
                <button onclick="triggerSearch()">Search</button>
            </div>
            <div class="nav-icons">
                <button class="icon-btn" onclick="goToLogin()" id="userBtn">👤 <span>Login</span></button>
                <button class="icon-btn" onclick="toggleCart()">🛒 <span>Cart</span> <div class="badge" id="cartCount">0</div></button>
            </div>
        </header>

        <div class="nav-wrapper">
            <button class="nav-arrow" onclick="scrollNav(-300)">❮</button>
            <div class="subnav" id="topNav"></div>
            <button class="nav-arrow" onclick="scrollNav(300)">❯</button>
        </div>
    </div>

    <div class="layout">
        <aside class="sidebar">
            <button class="btn-clear" onclick="clearFilters()">🧹 Clear All Filters</button>
        
            <div class="filter-group">
                <div class="filter-title">Price Range</div>
                <label class="filter-item"><input type="radio" name="price" value="0-1000" onchange="applyFilters()"> Under ₹1,000</label>
                <label class="filter-item"><input type="radio" name="price" value="1000-5000" onchange="applyFilters()"> ₹1,000 - ₹5,000</label>
                <label class="filter-item"><input type="radio" name="price" value="5000-15000" onchange="applyFilters()"> ₹5,000 - ₹15,000</label>
                <label class="filter-item"><input type="radio" name="price" value="15000-50000" onchange="applyFilters()"> ₹15,000 - ₹50,000</label>
                <label class="filter-item"><input type="radio" name="price" value="50000-9999999" onchange="applyFilters()"> Over ₹50,000</label>
                
                <div class="price-inputs">
                    <input type="number" id="minPrice" placeholder="Min ₹" oninput="clearPriceRadios()">
                    <span style="color: var(--text-light); font-weight: 600;">-</span>
                    <input type="number" id="maxPrice" placeholder="Max ₹" oninput="clearPriceRadios()">
                    <button class="btn-go" onclick="applyFilters()">Go</button>
                </div>
            </div>
        
            <div class="filter-group">
                <div class="filter-title">Customer Ratings</div>
                <label class="filter-item"><input type="radio" name="rating" value="4.5" onchange="applyFilters()"> <span style="color:#FFA41C; margin-right:6px;">★★★★½</span> & Up</label>
                <label class="filter-item"><input type="radio" name="rating" value="4" onchange="applyFilters()"> <span style="color:#FFA41C; margin-right:6px;">★★★★☆</span> & Up</label>
                <label class="filter-item"><input type="radio" name="rating" value="3" onchange="applyFilters()"> <span style="color:#FFA41C; margin-right:6px;">★★★☆☆</span> & Up</label>
            </div>
        
            <div class="filter-group">
                <div class="filter-title">Sort By</div>
                <select id="sortBy" onchange="applyFilters()">
                    <option value="popularity">Popularity (AI Picks)</option>
                    <option value="price_low">Price: Low to High</option>
                    <option value="price_high">Price: High to Low</option>
                    <option value="rating">Top Rated First</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <h2 class="section-title" id="secTitle">🔥 Trending Products</h2>
            <div class="product-grid" id="productGrid"></div>
        </main>
    </div>

    <div class="modal-overlay" id="productModal" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-img-col" id="modalImgDiv"></div>
            <div class="modal-info-col">
                <div class="modal-brand" id="modalBrand">BRAND</div>
                <h2 class="modal-title" id="modalTitle">Product Title</h2>
                <div class="modal-rating" id="modalRating">★★★★☆ <span>(0 Reviews)</span></div>
                <div class="modal-price" id="modalPrice">₹0.00</div>
                <p class="modal-desc" id="modalDesc">Description goes here.</p>
                <button class="modal-add-btn" id="modalAddBtn">Add to Cart</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="cartOverlay" onclick="if(event.target===this) toggleCart()" style="z-index: 1000; background: rgba(0,0,0,0.2);"></div>
    <div class="cart-slider" id="cartSlider">
        <div class="cart-header">
            Your Cart
            <button class="modal-close" style="position:static; background:none; border:none;" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total"><span style="color:var(--text-light); font-weight:500;">Total</span> <span id="cartTotalText">₹0.00</span></div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <div class="toast-notification" id="aiToast">
        ✨ AI has analyzed your style. Refreshing your top picks! 🚀
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let currentUserId = localStorage.getItem('user_id');
        let currentCategory = ""; 
        let currentSearchQuery = ""; 
        let cart = [];

        let viewStartTime = 0;
        let viewedProductId = null;

        window.onload = () => {
            if(currentUserId) {
                document.getElementById('userBtn').innerHTML = '👤 <span style="font-size:11px; font-weight:700; color:var(--blue); margin-top:6px;">Logged In</span>';
            }
            loadCategories(); 
            applyFilters();   
        };

        async function loadCategories() {
            const topNav = document.getElementById('topNav');
            
            topNav.innerHTML = `
                <div class="snav-item active" onclick="setCategory('', this)">🔥 All Products</div>
                <div class="snav-item btn-for-you" id="btnForYou" onclick="setCategory('For You', this)">✨ For You</div>
            `;
            
            try {
                let res = await fetch(`${API}/categories`);
                let categories = await res.json();
                
                const priorityOrder = [
                    "Clothing, Shoes & Jewelry", "Electronics", "Cell Phones & Accessories", "Home & Kitchen",
                    "Women's Clothing", "Sports & Outdoors", "Men's Clothing", "Toys & Games",
                    "Beauty & Personal Care", "Computers & Accessories", "Health & Household", "Pet Supplies",
                    "Automotive", "Grocery & Gourmet Food", "Tools & Home Improvement", "Office Products"
                ];

                categories.sort((a, b) => {
                    let indexA = priorityOrder.indexOf(a.name);
                    let indexB = priorityOrder.indexOf(b.name);
                    if (indexA === -1) indexA = 999;
                    if (indexB === -1) indexB = 999;
                    return indexA - indexB;
                });

                const categoryIcons = {
                    "Electronics": "💻", "Computers & Accessories": "🖥️", "Cell Phones & Accessories": "📱",
                    "Clothing, Shoes & Jewelry": "👕", "Men's Clothing": "👔", "Women's Clothing": "👗",
                    "Home & Kitchen": "🏠", "Beauty & Personal Care": "✨", "Sports & Outdoors": "⚽", 
                    "Toys & Games": "🎮", "Automotive": "🚗", "Health & Household": "⚕️", 
                    "Tools & Home Improvement": "🛠️", "Grocery & Gourmet Food": "🍎", 
                    "Office Products": "📎", "Pet Supplies": "🐶"
                };

                categories.forEach(cat => {
                    if (!cat.name || cat.name === "General Products") return;
                    let icon = categoryIcons[cat.name] || "📌";
                    let btn = document.createElement('div');
                    btn.className = 'snav-item';
                    btn.innerHTML = `<span>${icon}</span> ${cat.name}`; 
                    btn.onclick = function() { setCategory(cat.name, this); };
                    topNav.appendChild(btn);
                });
            } catch (e) { console.error("Failed to load categories", e); }
        }

        function scrollNav(amount) {
            document.getElementById('topNav').scrollBy({ left: amount, behavior: 'smooth' });
        }

        function goToLogin() {
            if (currentUserId) {
                if(confirm("You are already logged in. Do you want to log out?")) {
                    localStorage.removeItem('user_id');
                    window.location.reload();
                }
            } else {
                window.location.href = 'login.html';
            }
        }

        function setCategory(catName, element) {
            document.querySelectorAll('.snav-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            
            currentCategory = catName;
            currentSearchQuery = ""; 
            document.getElementById('searchInput').value = ''; 
            applyFilters(); 
        }

        function triggerSearch() {
            let q = document.getElementById('searchInput').value.trim();
            if(!q) return;
            
            document.querySelectorAll('.snav-item').forEach(el => el.classList.remove('active'));
            currentCategory = ""; 
            currentSearchQuery = q; 
            applyFilters();
        }

        function clearPriceRadios() {
            document.querySelectorAll('input[name="price"]').forEach(radio => radio.checked = false);
        }

        function clearFilters() {
            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => el.checked = false);
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            let sortObj = document.getElementById('sortBy');
            if(sortObj) sortObj.value = 'popularity';
            applyFilters(); 
        }

        async function applyFilters() {
            // Main catalog limit
            let url = `${API}/products?limit=400`; 
            
            if (currentCategory === "For You") {
                let activeId = currentUserId ? currentUserId : (localStorage.getItem('session_id') || 'none');
                // VIP Curated Feed Limit
                url = `${API}/recommend/cold-start/${activeId}?limit=60`;
                document.getElementById('secTitle').textContent = "✨ VIP: Personalized Top Picks";
            } else {
                if (currentSearchQuery) url += `&search=${encodeURIComponent(currentSearchQuery)}`;
                if (currentCategory) url += `&category=${encodeURIComponent(currentCategory)}`;

                let minP = document.getElementById('minPrice').value;
                let maxP = document.getElementById('maxPrice').value;
                if (!minP && !maxP) {
                    const checkedPrice = document.querySelector('input[name="price"]:checked');
                    if (checkedPrice) {
                        let parts = checkedPrice.value.split('-');
                        minP = parts[0]; maxP = parts[1];
                    }
                }
                if (minP) url += `&min_price=${minP}`;
                if (maxP) url += `&max_price=${maxP}`;

                const checkedRating = document.querySelector('input[name="rating"]:checked');
                if (checkedRating) url += `&min_rating=${checkedRating.value}`;

                const sortElement = document.getElementById('sortBy');
                if (sortElement && sortElement.value) url += `&sort_by=${sortElement.value}`;
                if(currentUserId) url += `&user_id=${currentUserId}`;

                if (currentSearchQuery) {
                    document.getElementById('secTitle').textContent = `Search: "${currentSearchQuery}"`;
                } else {
                    document.getElementById('secTitle').textContent = currentCategory ? `${currentCategory}` : "🔥 Trending Across All Categories";
                }
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchProducts(url);
        }

        async function fetchProducts(url) {
            const grid = document.getElementById('productGrid');
            
            // 🚀 ANIMATION: Beautiful Skeleton Loaders injection
            grid.innerHTML = Array(12).fill(`
                <div class="card skeleton">
                    <div class="skeleton-img"></div>
                    <div class="card-info">
                        <div class="skeleton-text skeleton-brand"></div>
                        <div class="skeleton-text skeleton-title"></div>
                        <div class="skeleton-text skeleton-title-2"></div>
                        <div class="skeleton-text skeleton-price"></div>
                    </div>
                </div>
            `).join('');

            try {
                let res = await fetch(url);
                let products = await res.json();
                grid.innerHTML = '';
                
                if(!products || products.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:60px; color:var(--text-light); font-size:16px; font-weight:500;">No products matched your filters. Try clearing them!</div>';
                    return;
                }

                products.forEach((p, index) => {
                    let card = document.createElement('div');
                    // 🚀 ANIMATION: Staggered Fade-In Up applied to each card
                    card.className = 'card fade-in-up';
                    card.style.animationDelay = `${index * 0.04}s`; 
                    card.onclick = () => openModal(p);
                    
                    let ratingNum = p.avg_rating ? Math.round(p.avg_rating) : 4;
                    let ratingStars = "★".repeat(ratingNum) + "☆".repeat(5 - ratingNum);
                    
                    card.innerHTML = `
                        <div class="img-container">${getActualImageHtml(p)}</div>
                        <div class="card-info">
                            <div class="brand">${p.brand || p.category || 'Premium'}</div>
                            <div class="title">${p.name}</div>
                            <div class="rating">${ratingStars} <span style="color:var(--text-light); font-weight:500;">(${p.num_ratings})</span></div>
                            <div class="price-row">
                                <div class="price">₹${p.price.toLocaleString('en-IN')}</div>
                                <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.product_id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.image_url}')">+</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) { console.error("Fetch Error", e); }
        }

        function getActualImageHtml(p) {
            let actualUrl = (p.image_url && p.image_url.startsWith('http')) ? p.image_url.split('|')[0] : "";
            let shortName = (p.name || "Product").split(' ').slice(0, 3).join(' ');
            let brandName = (p.brand || p.category || "Brand").split(' ')[0].toUpperCase();
            let placeholderUrl = `https://placehold.co/400x400/F8F9FA/888888?text=${encodeURIComponent(brandName + '\\n' + shortName)}&font=Montserrat`;
            if (actualUrl) return `<img src="${actualUrl}" onerror="this.onerror=null; this.src='${placeholderUrl}';" style="width:100%; height:100%; object-fit:contain; mix-blend-mode: multiply;">`;
            return `<img src="${placeholderUrl}" style="width:100%; height:100%; object-fit:contain; mix-blend-mode: multiply;">`;
        }

        function openModal(p) {
            document.getElementById('modalImgDiv').innerHTML = getActualImageHtml(p);
            document.getElementById('modalBrand').textContent = p.brand || p.category || 'Premium Brand';
            document.getElementById('modalTitle').textContent = p.name;
            let ratingNum = p.avg_rating ? Math.round(p.avg_rating) : 4;
            let ratingStars = "★".repeat(ratingNum) + "☆".repeat(5 - ratingNum);
            document.getElementById('modalRating').innerHTML = `${ratingStars} <span>(${p.num_ratings} Reviews)</span>`;
            document.getElementById('modalPrice').textContent = `₹${p.price.toLocaleString('en-IN')}`;
            document.getElementById('modalDesc').textContent = p.description || "Premium quality product guaranteed to meet your expectations.";
            document.getElementById('modalAddBtn').onclick = () => {
                addToCart(p.product_id, p.name, p.price, p.image_url);
                closeModal();
                setTimeout(toggleCart, 300); // Wait for modal to close smoothly before opening cart
            };
            
            const overlay = document.getElementById('productModal');
            overlay.style.display = 'flex';
            // Slight delay to trigger CSS transition
            setTimeout(() => overlay.classList.add('show'), 10);
            
            viewedProductId = p.product_id;
            viewStartTime = Date.now(); 
            trackEvent('click', p.product_id); 
        }

        function closeModal() { 
            const overlay = document.getElementById('productModal');
            overlay.classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 300); // Wait for fade out
            
            if (viewedProductId && viewStartTime > 0) {
                let durationInSeconds = Math.floor((Date.now() - viewStartTime) / 1000);
                if (durationInSeconds > 1) {
                    let activeId = currentUserId ? currentUserId : (localStorage.getItem('session_id') || 'anon_closing');
                    trackEvent('view', viewedProductId, durationInSeconds);
                }
                viewedProductId = null;
                viewStartTime = 0;
            }
        }

        window.addEventListener('beforeunload', () => {
            if (viewedProductId && viewStartTime > 0) {
                let durationInSeconds = Math.floor((Date.now() - viewStartTime) / 1000);
                if (durationInSeconds > 1) {
                    trackEvent('view', viewedProductId, durationInSeconds);
                }
            }
        });

        function toggleCart() {
            const slider = document.getElementById('cartSlider');
            const overlay = document.getElementById('cartOverlay');
            if(slider.classList.contains('open')) {
                slider.classList.remove('open');
                overlay.classList.remove('show');
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            } else {
                slider.classList.add('open');
                overlay.style.display = 'block';
                setTimeout(() => overlay.classList.add('show'), 10);
                renderCart();
            }
        }

        function addToCart(id, name, price, img) {
            cart.push({id, name, price, img});
            
            const badge = document.getElementById('cartCount');
            badge.textContent = cart.length;
            
            // 🚀 ANIMATION: Cart Badge Bounce
            badge.classList.remove('pop-anim');
            void badge.offsetWidth; // Trigger reflow to restart animation
            badge.classList.add('pop-anim');
            
            renderCart();
            trackEvent('cart_add', id); 
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cartCount').textContent = cart.length;
            renderCart();
        }

        function renderCart() {
            let html = ''; let total = 0;
            if(cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<div style="text-align:center; padding-top:60px; color:var(--text-light);"><div style="font-size:40px; margin-bottom:15px;">🛒</div><p>Your cart is empty!</p></div>';
                document.getElementById('cartTotalText').textContent = '₹0.00';
                return;
            }
            cart.forEach((item, index) => {
                let safeImg = (item.img && item.img.startsWith('http')) ? item.img.split('|')[0] : 'https://placehold.co/100x100?text=Item';
                total += item.price;
                html += `
                    <div class="cart-item" style="animation-delay: ${index * 0.05}s">
                        <img src="${safeImg}" onerror="this.src='https://placehold.co/100x100?text=Item'">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">₹${item.price.toLocaleString('en-IN')}</div>
                            <button class="cart-remove" onclick="removeFromCart(${index})">Remove item</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cartItems').innerHTML = html;
            document.getElementById('cartTotalText').textContent = `₹${total.toLocaleString('en-IN')}`;
        }

        function trackEvent(eventType, productId, hoverDuration = 0) {
            let sessionId = localStorage.getItem('session_id');
            if (!sessionId) {
                sessionId = 'anon_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('session_id', sessionId);
            }
            
            let activeId = currentUserId ? currentUserId : sessionId;

            const payload = {
                session_id: sessionId,
                user_id: activeId, 
                events: [{ type: eventType, product_id: productId, hover_duration: hoverDuration }]
            };

            fetch(`${API}/tracking/behavior`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true // Ensures event fires even if page is closing
            }).catch(e => console.log("Telemetry silent drop"));
        }

        function jumpToForYou() {
            document.getElementById('aiToast').classList.remove('show');
            setCategory('For You', document.getElementById('btnForYou'));
        }

        setTimeout(() => {
            if (currentUserId || localStorage.getItem('session_id')) {
                const toast = document.getElementById('aiToast');
                toast.innerHTML = `
                    <span style="font-size: 18px;">✨</span> 
                    AI has updated your VIP Picks! 
                    <button onclick="jumpToForYou()" style="margin-left:10px; background:var(--blue-gradient); color:white; border:none; padding:8px 16px; border-radius:100px; font-weight:600; cursor:pointer; box-shadow: 0 4px 12px rgba(94, 92, 230, 0.3); transition: transform 0.2s;">View Now</button>
                    <button onclick="this.parentElement.classList.remove('show')" style="margin-left:5px; background:none; border:none; color:var(--text-light); cursor:pointer; font-size:16px;">✕</button>
                `;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 12000);
            }
        }, 60000);
    </script>
</body>
</html>
